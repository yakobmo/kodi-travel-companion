services:
  - type: web
    name: kodi-travel-companion
    runtime: node
    plan: free
    branch: main
    buildCommand: corepack enable && corepack prepare pnpm@11.7.0 --activate && pnpm install --frozen-lockfile && pnpm run build
    startCommand: corepack enable && pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
