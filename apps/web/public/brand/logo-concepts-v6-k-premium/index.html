<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kodi premium K concepts V6</title>
    <style>
      body { margin: 0; background: #f3fbfe; color: #063f5f; font-family: Arial, Helvetica, sans-serif; }
      main { max-width: 1160px; margin: 0 auto; padding: 32px 18px 54px; }
      h1 { margin: 0 0 8px; font-size: 30px; }
      p { margin: 0 0 26px; color: #55768a; }
      .grid { direction: ltr; display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 18px; }
      figure { margin: 0; padding: 18px 16px; border: 1px solid #d6e9f0; border-radius: 14px; background: #fff; text-align: center; }
      img { width: 136px; height: 136px; display: block; margin: 0 auto 13px; }
      figcaption { min-height: 42px; font-weight: 700; line-height: 1.35; }
    </style>
  </head>
  <body>
    <main>
      <h1>לוגו קודי - K פרימיום</h1>
      <p>אלכסון מובנה בתוך האות, בלי משולש חיצוני ובלי עומס.</p>
      <section class="grid" aria-label="Kodi premium K concepts">
        <figure><img src="kodi-k-v6-a-flow.svg" alt="Flow K" /><figcaption>A - זרימה נקייה</figcaption></figure>
        <figure><img src="kodi-k-v6-b-ribbon.svg" alt="Ribbon K" /><figcaption>B - אלכסון סרט</figcaption></figure>
        <figure><img src="kodi-k-v6-c-soft-compass.svg" alt="Soft compass K" /><figcaption>C - מצפן עדין</figcaption></figure>
        <figure><img src="kodi-k-v6-d-monogram.svg" alt="Monogram K" /><figcaption>D - מונוגרמה חזקה</figcaption></figure>
        <figure><img src="kodi-k-v6-e-outline.svg" alt="Outline K" /><figcaption>E - קונטור</figcaption></figure>
      </section>
    </main>
  </body>
</html>
