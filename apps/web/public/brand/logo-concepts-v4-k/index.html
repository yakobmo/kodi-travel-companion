<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kodi K logo concepts V4</title>
    <style>
      body {
        margin: 0;
        background: #f3fbfe;
        color: #063f5f;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        max-width: 1160px;
        margin: 0 auto;
        padding: 32px 18px 54px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 30px;
      }

      p {
        margin: 0 0 26px;
        color: #55768a;
      }

      .grid {
        direction: ltr;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
        padding: 18px 16px;
        border: 1px solid #d6e9f0;
        border-radius: 14px;
        background: #fff;
        text-align: center;
      }

      img {
        width: 136px;
        height: 136px;
        display: block;
        margin: 0 auto 13px;
      }

      figcaption {
        min-height: 42px;
        font-weight: 700;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>לוגו קודי - כיווני K חדשים</h1>
      <p>K גדולה וקריאה, עם רמז ניווט/שיחה/מפה. לא שחזור של הסבב הקודם.</p>
      <section class="grid" aria-label="Kodi K logo concepts">
        <figure>
          <img src="kodi-k-v4-a-arrow-cut.svg" alt="K with arrow" />
          <figcaption>A - K וחץ ניווט</figcaption>
        </figure>
        <figure>
          <img src="kodi-k-v4-b-chat-k.svg" alt="K in chat bubble" />
          <figcaption>B - K בתוך שיחה</figcaption>
        </figure>
        <figure>
          <img src="kodi-k-v4-c-map-k.svg" alt="K on map" />
          <figcaption>C - K על מפה</figcaption>
        </figure>
        <figure>
          <img src="kodi-k-v4-d-compass-k.svg" alt="K with compass" />
          <figcaption>D - K ומצפן נקי</figcaption>
        </figure>
        <figure>
          <img src="kodi-k-v4-e-pin-k.svg" alt="K in map pin" />
          <figcaption>E - K בתוך סיכה</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
