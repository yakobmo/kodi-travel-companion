<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kodi integrated K concepts V5</title>
    <style>
      body {
        margin: 0;
        background: #f3fbfe;
        color: #063f5f;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        max-width: 1160px;
        margin: 0 auto;
        padding: 32px 18px 54px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 30px;
      }

      p {
        margin: 0 0 26px;
        color: #55768a;
      }

      .grid {
        direction: ltr;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
        padding: 18px 16px;
        border: 1px solid #d6e9f0;
        border-radius: 14px;
        background: #fff;
        text-align: center;
      }

      img {
        width: 136px;
        height: 136px;
        display: block;
        margin: 0 auto 13px;
      }

      figcaption {
        min-height: 42px;
        font-weight: 700;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>לוגו קודי - K עם כיוון מובנה</h1>
      <p>אין משולש מודבק. הכיוון/חץ יושב בתוך האלכסון של האות עצמה.</p>
      <section class="grid" aria-label="Kodi integrated K logo concepts">
        <figure>
          <img src="kodi-k-v5-a-integrated-arrow.svg" alt="Integrated arrow K" />
          <figcaption>A - חץ מתוך האלכסון</figcaption>
        </figure>
        <figure>
          <img src="kodi-k-v5-b-route-stroke.svg" alt="Route stroke K" />
          <figcaption>B - קו מסלול על האלכסון</figcaption>
        </figure>
        <figure>
          <img src="kodi-k-v5-c-negative-arrow.svg" alt="Negative arrow K" />
          <figcaption>C - חיתוך קטן באות</figcaption>
        </figure>
        <figure>
          <img src="kodi-k-v5-d-clean-k.svg" alt="Clean integrated K" />
          <figcaption>D - K נקייה עם אלכסון מדורג</figcaption>
        </figure>
        <figure>
          <img src="kodi-k-v5-e-compass-ring.svg" alt="Compass ring integrated K" />
          <figcaption>E - מצפן ו-K משולבת</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
