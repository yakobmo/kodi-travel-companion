<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kodi logo concepts V2</title>
    <style>
      body {
        margin: 0;
        background: #f3fbfe;
        color: #063f5f;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        max-width: 1160px;
        margin: 0 auto;
        padding: 32px 18px 54px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 30px;
      }

      p {
        margin: 0 0 26px;
        color: #55768a;
      }

      .grid {
        direction: ltr;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
        padding: 18px 16px;
        border: 1px solid #d6e9f0;
        border-radius: 14px;
        background: #fff;
        text-align: center;
      }

      img {
        width: 136px;
        height: 136px;
        display: block;
        margin: 0 auto 13px;
      }

      figcaption {
        min-height: 42px;
        font-weight: 700;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>לוגו קודי - התחלה חדשה</h1>
      <p>לא שחזור של הלוגו הקודם. חמישה כיוונים מקוריים, וקטוריים ושמורים.</p>
      <section class="grid" aria-label="Kodi new logo concepts">
        <figure>
          <img src="kodi-v2-a-route-compass.svg" alt="Route Compass" />
          <figcaption>A - מצפן ונתיב</figcaption>
        </figure>
        <figure>
          <img src="kodi-v2-b-chat-pin.svg" alt="Chat Pin" />
          <figcaption>B - צ׳אט ונקודת מפה</figcaption>
        </figure>
        <figure>
          <img src="kodi-v2-c-smart-route.svg" alt="Smart Route" />
          <figcaption>C - מסלול חכם</figcaption>
        </figure>
        <figure>
          <img src="kodi-v2-d-guide-star.svg" alt="Guide Star" />
          <figcaption>D - מדריך/כוכב דרך</figcaption>
        </figure>
        <figure>
          <img src="kodi-v2-e-map-agent.svg" alt="Map Agent" />
          <figcaption>E - מפה וסוכן</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
