<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kodi logo concepts V3</title>
    <style>
      body {
        margin: 0;
        background: #f3fbfe;
        color: #063f5f;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        max-width: 1160px;
        margin: 0 auto;
        padding: 32px 18px 54px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 30px;
      }

      p {
        margin: 0 0 26px;
        color: #55768a;
      }

      .grid {
        direction: ltr;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
        padding: 18px 16px;
        border: 1px solid #d6e9f0;
        border-radius: 14px;
        background: #fff;
        text-align: center;
      }

      img {
        width: 136px;
        height: 136px;
        display: block;
        margin: 0 auto 13px;
      }

      figcaption {
        min-height: 42px;
        font-weight: 700;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>לוגו קודי - סט נוסף</h1>
      <p>יותר פשוטים, יותר אייקוניים, פחות פרטים קטנים.</p>
      <section class="grid" aria-label="Kodi logo concepts V3">
        <figure>
          <img src="kodi-v3-a-orbit-pin.svg" alt="Orbit Pin" />
          <figcaption>A - נקודת מסלול</figcaption>
        </figure>
        <figure>
          <img src="kodi-v3-b-guiding-arrow.svg" alt="Guiding Arrow" />
          <figcaption>B - חץ מנחה</figcaption>
        </figure>
        <figure>
          <img src="kodi-v3-c-chat-route.svg" alt="Chat Route" />
          <figcaption>C - שיחה ומסלול</figcaption>
        </figure>
        <figure>
          <img src="kodi-v3-d-twin-points.svg" alt="Twin Points" />
          <figcaption>D - נקודות קבוצה</figcaption>
        </figure>
        <figure>
          <img src="kodi-v3-e-compass-bubble.svg" alt="Compass Bubble" />
          <figcaption>E - מצפן בתוך שיחה</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
