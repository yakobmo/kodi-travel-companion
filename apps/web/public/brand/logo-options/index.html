<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kodi logo vector options</title>
    <style>
      body {
        margin: 0;
        background: #f5fbfd;
        color: #073f5f;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 18px 48px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 28px;
      }

      p {
        margin: 0 0 24px;
        color: #517083;
      }

      .grid {
        direction: ltr;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
        padding: 16px;
        border: 1px solid #d9e9ef;
        border-radius: 14px;
        background: #fff;
        text-align: center;
      }

      img {
        width: 128px;
        height: 128px;
        display: block;
        margin: 0 auto 12px;
      }

      figcaption {
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>אפשרויות לוגו וקטוריות לקודי</h1>
      <p>כל האפשרויות שמורות כ-SVG, כדי שנוכל לדייק ולא לשחזר מאפס.</p>
      <section class="grid" aria-label="Kodi logo options">
        <figure>
          <img src="../kodi-compass-k-source.png" alt="מקור" />
          <figcaption>מקור</figcaption>
        </figure>
        <figure>
          <img src="kodi-logo-option-a.svg" alt="אפשרות A" />
          <figcaption>A - הכי קרוב למקור</figcaption>
        </figure>
        <figure>
          <img src="kodi-logo-option-b.svg" alt="אפשרות B" />
          <figcaption>B - K חזק יותר</figcaption>
        </figure>
        <figure>
          <img src="kodi-logo-option-c.svg" alt="אפשרות C" />
          <figcaption>C - עגול ורך יותר</figcaption>
        </figure>
        <figure>
          <img src="kodi-logo-option-d.svg" alt="אפשרות D" />
          <figcaption>D - מאוזן ושמרני</figcaption>
        </figure>
        <figure>
          <img src="kodi-logo-option-e.svg" alt="אפשרות E" />
          <figcaption>E - מרובע וחד יותר</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
